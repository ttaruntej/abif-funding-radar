name: Verified Source Sync

concurrency:
  group: source-sync-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Verified Source Sync
        run: npm run sync
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit Curated Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/opportunities.json public/data/publishable_opportunities.json public/data/review_queue.json public/data/research_report.json
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: sync verified-source opportunities"
          git push

      - name: Build React App
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Preserve history for cleaner deployments
          keep_files: true 
          # Skip CI to prevent Vercel from trying to build the gh-pages branch
          commit_message: "deploy: ${{ github.sha }} [skip ci]"
