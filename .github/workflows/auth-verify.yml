name: Security - Verify Access Key

on:
  workflow_dispatch:
    inputs:
      password:
        description: 'Key to verify'
        required: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check Key
        run: |
          ENTRY="${{ github.event.inputs.password }}"
          MASTER="${{ secrets.SITE_PASSWORD }}"
          
          if [ -z "$MASTER" ]; then
            echo "❌ Error: SITE_PASSWORD secret is not set in GitHub Repository Secrets."
            exit 1
          fi
          
          if [ "$ENTRY" == "$MASTER" ]; then
            echo "✅ AUTH_STATUS: GRANTED"
          else
            echo "❌ AUTH_STATUS: DENIED"
            exit 1
          fi
