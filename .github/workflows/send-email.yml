name: Send Email Report

on:
  workflow_dispatch:
    inputs:
      target_emails:
        description: 'Target email addresses (comma separated). Leave blank to use default.'
        required: false
        default: ''
      mode:
        description: 'Briefing mode (standard | filtered)'
        required: false
        default: 'standard'
      filters:
        description: 'JSON string of filters to apply'
        required: false
        default: '{}'

permissions:
  contents: write

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Email Script
        run: node scripts/send-email.js
        env:
          TARGET_EMAILS: ${{ github.event.inputs.target_emails }}
          DISPATCH_MODE: ${{ github.event.inputs.mode }}
          DISPATCH_FILTERS: ${{ github.event.inputs.filters }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          ABIF_TEAM_EMAIL: ${{ secrets.ABIF_TEAM_EMAIL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit Email History
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/last_email_sent.json public/data/last_dispatch_meta.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update email history and dispatch metadata"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
